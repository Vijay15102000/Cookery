<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karnataka Culinary</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:white}

/* NAV */
.nav{display:flex;justify-content:space-between;padding:15px;background:#fff;
position:fixed;width:100%;z-index:1000;box-shadow:0 2px 5px #ccc}
.menu{display:flex;gap:15px}
.ham{display:none}

@media(max-width:768px){
.menu{display:none}
.ham{display:block}
.mobile{position:fixed;right:0;top:0;width:70%;height:100%;background:#fff;padding:20px}
}

/* HERO */
.hero{height:100vh;position:relative}
.hero video{width:100%;height:100%;object-fit:cover}
.text{position:absolute;right:20px;top:40%;color:white;font-size:60px;
animation:shrink 5s forwards}
@keyframes shrink{from{font-size:60px}to{font-size:25px}}

/* SECTION */
section{padding:80px 20px}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{border:1px solid #ddd;cursor:pointer;overflow:hidden}
.card img,.card video{width:100%;height:150px;object-fit:cover}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center}
.box{background:white;padding:20px;width:90%;max-height:90%;overflow:auto}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* ===== TRANSLATIONS ===== */
const T={
en:{
title:"KARNATAKA CULINARY MASTERPIECES",
historyTitle:"Culinary History of Karnataka",
historyText:"Karnataka cuisine is rich and diverse. Udupi cuisine is known for vegetarian dishes. Coastal regions use coconut and seafood. North Karnataka uses millets and spices. Traditional cooking methods define its uniqueness.",
search:"Search recipes...",
scroll:"Wanna Cook early without knowing more? Go below"
},
kn:{
title:"ಕರ್ನಾಟಕದ ಅಡುಗೆ ವೈಭವ",
historyTitle:"ಕರ್ನಾಟಕದ ಅಡುಗೆ ಇತಿಹಾಸ",
historyText:"ಕರ್ನಾಟಕದ ಅಡುಗೆ ಪದ್ಧತಿ ಬಹಳ ವೈವಿಧ್ಯಮಯವಾಗಿದೆ. ಉಡುಪಿ ಅಡುಗೆ ಸಸ್ಯಾಹಾರಕ್ಕೆ ಪ್ರಸಿದ್ಧವಾಗಿದೆ. ಕರಾವಳಿ ಭಾಗದಲ್ಲಿ ತೆಂಗಿನಕಾಯಿ ಮತ್ತು ಮೀನು ಹೆಚ್ಚು ಬಳಸುತ್ತಾರೆ. ಉತ್ತರ ಕರ್ನಾಟಕದಲ್ಲಿ ಜೋಳ ಮತ್ತು ಮಸಾಲೆ ಪದಾರ್ಥಗಳು ಬಳಸಲಾಗುತ್ತದೆ.",
search:"ಪಾಕವಿಧಾನ ಹುಡುಕಿ...",
scroll:"ಹೆಚ್ಚು ತಿಳಿಯದೆ ಅಡುಗೆ ಮಾಡಬೇಕೆ? ಕೆಳಗೆ ಹೋಗಿ"
}
};

/* ===== SPEECH ===== */
function speak(text,lang,rate){
window.speechSynthesis.cancel();
const s=new SpeechSynthesisUtterance(text);
s.lang=lang==="kn"?"kn-IN":"en-US";
s.rate=rate;
window.speechSynthesis.speak(s);
}

/* ===== APP ===== */
function App(){

const [lang,setLang]=React.useState("en");
const [menu,setMenu]=React.useState(false);
const [selected,setSelected]=React.useState(null);
const [time,setTime]=React.useState(0);
const [rate,setRate]=React.useState(1);

const historyRef=React.useRef();
const timerRef=React.useRef();

/* SAMPLE DATA */
const [recipes,setRecipes]=React.useState([
{id:1,name:"Bisi Bele Bath",time:2,
steps:["Cook rice","Add vegetables","Add masala","Mix well"],
img:"https://source.unsplash.com/300x200/?food",
vid:"https://www.w3schools.com/html/mov_bbb.mp4"}
]);

const [places,setPlaces]=React.useState([
{name:"Hampi",vid:"https://www.w3schools.com/html/mov_bbb.mp4"}
]);

/* TIMER */
function startCooking(min){
let t=min*5;
setTime(t);
clearInterval(timerRef.current);

timerRef.current=setInterval(()=>{
t--;setTime(t);
if(t<=0){
clearInterval(timerRef.current);
for(let i=0;i<3;i++){
setTimeout(()=>{
let s=new SpeechSynthesisUtterance("Ready to eat");
window.speechSynthesis.speak(s);
},i*1500);
}
}
},1000);
}

return(
<div>

{/* NAV */}
<div className="nav">
<div>Karnataka Culinary</div>

<div className="menu">
<button onClick={()=>setLang(lang==="en"?"kn":"en")}>
{lang==="en"?"ಕನ್ನಡಕ್ಕಾಗಿ ಇಲ್ಲಿ ಒತ್ತಿರಿ":"For English click here"}
</button>
</div>

<div className="ham" onClick={()=>setMenu(true)}>☰</div>
</div>

{menu&&(
<div className="mobile">
<button onClick={()=>setMenu(false)}>Close</button>
</div>
)}

{/* HERO */}
<div className="hero">
<video autoPlay muted loop src="https://www.w3schools.com/html/mov_bbb.mp4"/>
<div className="text">{T[lang].title}</div>
</div>

{/* HISTORY */}
<section>
<h2>{T[lang].historyTitle}</h2>
<p ref={historyRef}>{T[lang].historyText}</p>

<button onClick={()=>speak(historyRef.current.innerText,lang,rate)}>▶</button>
<button onClick={()=>window.speechSynthesis.pause()}>⏸</button>
<button onClick={()=>window.speechSynthesis.resume()}>▶</button>
<button onClick={()=>window.speechSynthesis.cancel()}>⏹</button>

<br/>Speed:
<input type="range" min="0.5" max="2" step="0.1"
value={rate} onChange={e=>setRate(e.target.value)}/>
</section>

{/* RECIPES */}
<section>
<input placeholder={T[lang].search}/>
<div className="grid">
{recipes.map(r=>(
<div className="card" key={r.id} onClick={()=>setSelected(r)}>
<img src={r.img}/>
<div>{r.name} - {r.time} min</div>
</div>
))}
</div>
</section>

{/* PLACES */}
<section>
<div className="grid">
{places.map((p,i)=>(
<div className="card" key={i}>
<video autoPlay muted loop src={p.vid}/>
<div>{p.name}</div>
</div>
))}
</div>
</section>

{/* RECIPE PAGE */}
{selected&&(
<div className="modal">
<div className="box">

<h2>{selected.name}</h2>
<video src={selected.vid} controls width="100%"/>

<ol>
{selected.steps.map((s,i)=><li key={i}>{s}</li>)}
</ol>

<h3>Timer: {time}</h3>

<button onClick={()=>startCooking(selected.time)}>Start Cooking</button>
<button onClick={()=>setSelected(null)}>Close</button>

</div>
</div>
)}

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
